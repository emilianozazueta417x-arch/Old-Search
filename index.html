```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Old Search</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

ul{
list-style:none;
padding:0;
}

li{
background:#222;
margin:8px;
padding:10px;
border-radius:6px;
}

input,textarea{
margin:5px;
padding:6px;
}

#map{
height:300px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Archivo Lost Media</h1>
<p>Base de datos comunitaria de contenido perdido de internet</p>

<input id="buscador" placeholder="Buscar lost media">

<ul id="lista"></ul>

<h2>💬 Comentarios</h2>

<input id="nombre" placeholder="Nombre">
<textarea id="texto" placeholder="Comentario"></textarea>

<br>

<button onclick="comentar()">Comentar</button>

<ul id="comentarios"></ul>

<h2>🗺️ Mapa</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let lostMedia=[
"LOL Superman",
"Clockman",
"Pocoyo Pilot",
"Celebrity Number Six",
"Go For A Punch",
"Cry Baby Lane",
"Hitogata",
"No Me Pises Pa",
"WhatsApp PS4"
]

function mostrar(){

let lista=document.getElementById("lista")

lista.innerHTML=""

lostMedia.forEach(c=>{

let li=document.createElement("li")

li.textContent=c

lista.appendChild(li)

})

}

function comentar(){

let nombre=document.getElementById("nombre").value
let texto=document.getElementById("texto").value

if(!nombre || !texto) return

let lista=document.getElementById("comentarios")

let li=document.createElement("li")

li.innerHTML="<b>"+nombre+"</b>: "+texto

lista.appendChild(li)

}

document.getElementById("buscador").onkeyup=function(){

let t=this.value.toLowerCase()

let lista=document.getElementById("lista")

lista.innerHTML=""

lostMedia.filter(c=>c.toLowerCase().includes(t))
.forEach(c=>{

let li=document.createElement("li")

li.textContent=c

lista.appendChild(li)

})

}

mostrar()

window.onload=function(){

let map=L.map('map').setView([20,0],2)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

}

</script>

</body>
</html>
```
